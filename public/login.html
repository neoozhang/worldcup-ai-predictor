<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>世界杯AI预测 - 登录</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:linear-gradient(135deg,#0a0a2e,#1a1a3e);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.card{background:rgba(255,255,255,0.05);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.1);border-radius:20px;padding:40px 30px;text-align:center;max-width:380px;width:100%;}
.emoji{font-size:4rem;margin-bottom:16px;}
h1{color:#ffd700;font-size:1.5rem;margin-bottom:8px;font-weight:900;}
.desc{color:#8899aa;font-size:0.85rem;margin-bottom:24px;}
input{width:100%;padding:14px 16px;border-radius:12px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:#fff;font-size:1rem;text-align:center;outline:none;transition:all 0.3s;}
input:focus{border-color:#ffd700;box-shadow:0 0 20px rgba(255,215,0,0.15);}
button{width:100%;padding:14px;border-radius:12px;background:linear-gradient(135deg,#f59e0b,#d97706);color:#fff;border:none;font-size:1rem;font-weight:700;cursor:pointer;margin-top:12px;transition:all 0.3s;}
button:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(245,158,11,0.3);}
.error{color:#ef4444;font-size:0.8rem;margin-top:8px;display:none;}
.info{color:#8899aa;font-size:0.7rem;margin-top:20px;}
</style>
</head>
<body>
<div class="card">
  <div class="emoji">🏆</div>
  <h1>2026世界杯 AI预言家</h1>
  <div class="desc">5大AI同时预测，谁是真预言帝？</div>
  <input type="password" id="pwd" placeholder="输入激活码" autofocus>
  <button onclick="login()">🔓 进入</button>
  <div class="error" id="err">激活码无效或已使用</div>
  <div class="info">联系博主购买激活码</div>
</div>
<script>
async function login(){
  const pwd=document.getElementById('pwd').value;
  if(!pwd)return;
  try{
    const r=await fetch('/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:pwd})});
    const d=await r.json();
    if(d.success) location.href='/';
    else{document.getElementById('err').style.display='block';}
  }catch(e){document.getElementById('err').style.display='block';}
}
document.getElementById('pwd').addEventListener('keydown',e=>{if(e.key==='Enter')login();});
</script>
</body>
</html>
